<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imamu's homepage</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            background: #0a001f;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            min-height: 100vh;
            color: #696969;
            font-family: "MS PGothic", "Hiragino Sans", sans-serif;
        }

        .background-gif {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0.9;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            background: #a1d8e2;
            border: 6px solid #696969;
            padding: 30px;
            position: relative;
            z-index: 2;
        }

        h1 { text-align: center; color: #696969; font-size: 42px; margin-bottom: 10px; }
        h2 { color: #696969; border-bottom: 3px solid #e6e6fa; padding-bottom: 8px; }

        a { color: #696969; text-decoration: none; }
        a:hover { color: #ffffff; text-decoration: underline; }

        .blog-list { margin-top: 20px; }
        .blog-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 6px solid #66ffff;
            cursor: pointer;
        }
        .blog-date { color: #888; font-size: 14px; }
        .blog-image { max-width: 100%; margin: 10px 0; border-radius: 4px; }

        .full-content {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #ddd;
            white-space: pre-wrap;
            line-height: 1.7;
        }
        .blog-item.expanded .full-content { display: block; }
    </style>
</head>
<body>

    <img id="bgGif" class="background-gif" src="cloud3.gif" alt="">

    <!-- ホーム画面 -->
    <div class="container" id="mainPage">
        <h1>imamu_homepage</h1>
        <p style="text-align:center; font-size:18px;">ようこそ！imamuのホームページへ！</p>

        <h2>◆ Profile</h2>
        <p>こんにちは、mamuです。<br>インターネットでは何ができるかな？<br>模索するためにとりあえずホームページを作りました。</p>

        <h2>◆ Links</h2>
        <ul>
            <li><a href="#">→ 秘密の部屋</a></li>
            <li><a href="#" onclick="showBlogList()">→ ブログ日記</a></li>
            <li><a href="#">→ 思い出のフォト</a></li>
            <li><a href="#">→ imamu_to_do_list をダウンロード</a></li>
        </ul>

        <p style="text-align:center; margin-top:40px;">
            <a href="#" style="font-size:22px; background:#9eceff; color:white; padding:15px 40px; border:4px solid #66ffff;">
                今すぐダウンロード
            </a>
        </p>

        <p style="text-align:center; margin-top:60px; font-size:14px; color:#a9a9a9;">
            © 2026 imamu All Rights Reserved
        </p>
    </div>

    <!-- ブログ日記一覧 -->
    <div class="container" id="blogPage" style="display:none;">
        <h1>ブログ日記</h1>
        <p style="text-align:center;">
            <a href="#" onclick="backToMain()">← ホームに戻る</a> | 
            <a href="#" onclick="showPostForm()">→ 新規投稿</a>
        </p>
        <div id="blogList" class="blog-list"></div>
    </div>

    <!-- 新規投稿フォーム -->
    <div class="container" id="postForm" style="display:none;">
        <h1>新しい記事を書く</h1>
        <input type="text" id="postTitle" placeholder="タイトルを入力">
        <textarea id="postContent" rows="10" placeholder="本文を入力"></textarea>
        
        <label>写真を追加：
            <input type="file" id="postImage" accept="image/*">
        </label>
        
        <button onclick="savePost()">投稿する</button>
        <button onclick="cancelPost()" style="background:#ccc;">キャンセル</button>
    </div>

    <script>
        // ====================== Firebase設定 ======================
        const firebaseConfig = {
            apiKey: "AIzaSyA6ljR86oqQjyzTdhI53zaKuRSzNryw3sw",
            authDomain: "imamu-homepage.firebaseapp.com",
            projectId: "imamu-homepage",
            storageBucket: "imamu-homepage.firebasestorage.app",
            messagingSenderId: "922053214221",
            appId: "1:922053214221:web:8eae331790efbc08025544",
            measurementId: "G-RRJZ8MGGCK"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ====================== 背景GIF ======================
        const bgGif = document.getElementById('bgGif');
        let isReversed = false;
        function switchGif() {
            bgGif.src = isReversed ? "cloud3.gif" : "cloud4.gif";
            isReversed = !isReversed;
        }
        bgGif.src = "cloud3.gif";
        setInterval(switchGif, 5000);

        // ====================== ブログ機能 ======================
        let posts = [];

        function renderBlogList() {
            const container = document.getElementById('blogList');
            container.innerHTML = '';

            db.collection("posts").orderBy("timestamp", "desc").get().then((querySnapshot) => {
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; color:#888;">まだ記事がありません。</p>';
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    const div = document.createElement('div');
                    div.className = 'blog-item';
                    div.innerHTML = `
                        <div class="blog-date">${post.date}</div>
                        <h3>${post.title}</h3>
                        ${post.image ? `<img src="${post.image}" class="blog-image" style="max-width:100%; margin:10px 0;">` : ''}
                        <p>${post.content.substring(0, 80)}...</p>
                        <div class="full-content">${post.content}</div>
                        <button onclick="deletePost('${doc.id}'); event.stopImmediatePropagation();" style="background:#ff6666; color:white; font-size:12px; padding:4px 8px; margin-top:8px;">削除</button>
                    `;
                    div.onclick = () => toggleFullContent(div);
                    container.appendChild(div);
                });
            });
        }

        function toggleFullContent(element) {
            element.classList.toggle('expanded');
        }

        function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const fileInput = document.getElementById('postImage');
            const file = fileInput.files[0];

            if (!title || !content) {
                alert("タイトルと本文を入力してください");
                return;
            }

            const newPost = {
                date: new Date().toISOString().slice(0,10),
                title: title,
                content: content,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    newPost.image = e.target.result;
                    db.collection("posts").add(newPost).then(finishSave);
                };
                reader.readAsDataURL(file);
            } else {
                db.collection("posts").add(newPost).then(finishSave);
            }
        }

        function finishSave() {
            alert("投稿しました！");
            cancelPost();
            renderBlogList();
        }

        function deletePost(docId) {
            if (confirm("本当にこの記事を削除しますか？")) {
                db.collection("posts").doc(docId).delete().then(() => {
                    renderBlogList();
                });
            }
        }

        function showPostForm() {
            document.getElementById('blogPage').style.display = 'none';
            document.getElementById('postForm').style.display = 'block';
        }

        function cancelPost() {
            document.getElementById('postForm').style.display = 'none';
            document.getElementById('blogPage').style.display = 'block';
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
        }

        function showBlogList() {
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('blogPage').style.display = 'block';
            renderBlogList();
        }

        function backToMain() {
            document.getElementById('blogPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
        }
    </script>
</body>
</html>
